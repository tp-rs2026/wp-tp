<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/tapara-design-system-074ae7c6-13c9-470b-b3fa-c71ecdaeb0c9/colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</helmet>
<div style="width:1200px;height:600px;box-sizing:border-box;background:#FFFFFF;font-family:'Manrope',sans-serif;color:#0A0A0A;padding:48px 56px;display:flex;flex-direction:column;">

  <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:30px;">
    <span style="font-family:'Manrope';font-weight:500;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#888888;">Setting up the counter</span>
    <h2 style="font-family:'Noto Serif';font-weight:700;font-size:30px;line-height:1.15;margin:0;">Three things. That's the whole setup.</h2>
  </div>

  <!-- Counter, top-down -->
  <div style="flex:1;background:#F5F5F3;border:1px solid #E0E0DC;border-radius:20px;padding:36px 48px 30px;display:flex;flex-direction:column;">
    <div style="font-family:'Manrope';font-weight:500;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#888888;margin-bottom:24px;text-align:center;">Counter · viewed from above</div>

    <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:90px;">

      <!-- EFTPOS terminal -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
        <div style="width:120px;height:170px;background:#0A0A0A;border-radius:14px;padding:12px;box-sizing:border-box;display:flex;flex-direction:column;gap:10px;">
          <div style="height:52px;background:#FFFFFF;border-radius:8px;opacity:0.92;"></div>
          <div style="flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
            <div style="background:rgba(255,255,255,0.28);border-radius:5px;"></div><div style="background:rgba(255,255,255,0.28);border-radius:5px;"></div><div style="background:rgba(255,255,255,0.28);border-radius:5px;"></div>
            <div style="background:rgba(255,255,255,0.28);border-radius:5px;"></div><div style="background:rgba(255,255,255,0.28);border-radius:5px;"></div><div style="background:rgba(255,255,255,0.28);border-radius:5px;"></div>
            <div style="background:rgba(255,255,255,0.28);border-radius:5px;"></div><div style="background:#1D9E75;border-radius:5px;"></div><div style="background:rgba(255,255,255,0.28);border-radius:5px;"></div>
          </div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:'Manrope';font-weight:500;font-size:15px;">EFTPOS terminal</div>
          <div style="font-family:'Manrope';font-size:13px;color:#888888;margin-top:3px;">faces the customer</div>
        </div>
      </div>

      <!-- NFC pad -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
        <div style="width:110px;height:110px;background:#FFFFFF;border:1px solid #1D9E75;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-top:30px;margin-bottom:30px;">
          <span class="material-symbols-outlined" style="font-size:44px;color:#1D9E75;">contactless</span>
        </div>
        <div style="text-align:center;">
          <div style="font-family:'Manrope';font-weight:500;font-size:15px;">NFC pad</div>
          <div style="font-family:'Manrope';font-size:13px;color:#888888;margin-top:3px;">coaster-sized, no wires</div>
        </div>
      </div>

      <!-- Cash drawer -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
        <div style="width:190px;height:120px;background:#FFFFFF;border:1px solid #E0E0DC;border-radius:12px;padding:14px;box-sizing:border-box;display:flex;gap:10px;margin-top:25px;margin-bottom:25px;">
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
            <div style="flex:1;background:#F5F5F3;border-radius:6px;"></div>
            <div style="flex:1;background:#F5F5F3;border-radius:6px;"></div>
          </div>
          <div style="flex:1.4;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div style="background:#F5F5F3;border-radius:6px;"></div><div style="background:#F5F5F3;border-radius:6px;"></div>
            <div style="background:#F5F5F3;border-radius:6px;"></div><div style="background:#F5F5F3;border-radius:6px;"></div>
          </div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:'Manrope';font-weight:500;font-size:15px;">Cash drawer</div>
          <div style="font-family:'Manrope';font-size:13px;color:#888888;margin-top:3px;">behind the counter</div>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:600}}"></script>
</body>
</html>
