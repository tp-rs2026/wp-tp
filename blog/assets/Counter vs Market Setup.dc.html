<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/tapara-design-system-074ae7c6-13c9-470b-b3fa-c71ecdaeb0c9/colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</helmet>
<div style="width:1200px;height:600px;box-sizing:border-box;background:#FFFFFF;font-family:'Manrope',sans-serif;color:#0A0A0A;padding:48px 56px;display:flex;flex-direction:column;">

  <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:28px;">
    <span style="font-family:'Manrope';font-weight:500;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#888888;">Same pad, anywhere you trade</span>
    <h2 style="font-family:'Noto Serif';font-weight:700;font-size:30px;line-height:1.15;margin:0;">At the market, the setup shrinks to a phone and a tag.</h2>
  </div>

  <div style="flex:1;display:flex;gap:28px;">

    <!-- Counter -->
    <div style="flex:1;background:#F5F5F3;border:1px solid #E0E0DC;border-radius:20px;padding:26px 30px;display:flex;flex-direction:column;">
      <div style="font-family:'Manrope';font-weight:500;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#888888;">At your counter</div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:56px;">
        <!-- terminal -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
          <div style="width:88px;height:126px;background:#0A0A0A;border-radius:12px;padding:9px;box-sizing:border-box;display:flex;flex-direction:column;gap:8px;">
            <div style="height:38px;background:#FFFFFF;border-radius:6px;opacity:0.92;"></div>
            <div style="flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;">
              <div style="background:rgba(255,255,255,0.28);border-radius:4px;"></div><div style="background:rgba(255,255,255,0.28);border-radius:4px;"></div><div style="background:rgba(255,255,255,0.28);border-radius:4px;"></div>
              <div style="background:rgba(255,255,255,0.28);border-radius:4px;"></div><div style="background:rgba(255,255,255,0.28);border-radius:4px;"></div><div style="background:rgba(255,255,255,0.28);border-radius:4px;"></div>
              <div style="background:rgba(255,255,255,0.28);border-radius:4px;"></div><div style="background:#1D9E75;border-radius:4px;"></div><div style="background:rgba(255,255,255,0.28);border-radius:4px;"></div>
            </div>
          </div>
          <div style="font-family:'Manrope';font-weight:500;font-size:14px;">EFTPOS terminal</div>
        </div>
        <!-- pad -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
          <div style="width:84px;height:84px;background:#FFFFFF;border:1px solid #1D9E75;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-top:21px;margin-bottom:21px;">
            <span class="material-symbols-outlined" style="font-size:36px;color:#1D9E75;">contactless</span>
          </div>
          <div style="font-family:'Manrope';font-weight:500;font-size:14px;">NFC pad</div>
        </div>
      </div>
      <div style="padding-top:14px;border-top:1px solid #E0E0DC;font-family:'Manrope';font-size:13px;color:#888888;">Terminal lease · power · a fixed spot on the bench</div>
    </div>

    <!-- Market -->
    <div style="flex:1;background:#FFFFFF;border:1px solid #1D9E75;border-radius:20px;padding:26px 30px;display:flex;flex-direction:column;">
      <div style="font-family:'Manrope';font-weight:500;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#1D9E75;">At the market</div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:56px;">
        <!-- phone -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
          <div style="width:66px;height:126px;background:#0A0A0A;border-radius:14px;padding:5px;box-sizing:border-box;display:flex;">
            <div style="flex:1;background:#FFFFFF;border-radius:10px;display:flex;align-items:center;justify-content:center;">
              <span class="material-symbols-outlined" style="font-size:26px;color:#0A0A0A;">contactless</span>
            </div>
          </div>
          <div style="font-family:'Manrope';font-weight:500;font-size:14px;">Your phone</div>
        </div>
        <!-- pad -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
          <div style="width:84px;height:84px;background:#FFFFFF;border:1px solid #1D9E75;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-top:21px;margin-bottom:21px;">
            <span class="material-symbols-outlined" style="font-size:36px;color:#1D9E75;">contactless</span>
          </div>
          <div style="font-family:'Manrope';font-weight:500;font-size:14px;">The same NFC pad</div>
        </div>
      </div>
      <div style="padding-top:14px;border-top:1px solid #E0E0DC;font-family:'Manrope';font-size:13px;color:#1D9E75;font-weight:500;">No terminal · no wires · fits in your pocket</div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:600}}"></script>
</body>
</html>
