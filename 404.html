<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="robots" content="noindex, nofollow"/>
<title>tapara</title>
<script>
// Redirect clean URLs to the SPA — GitHub Pages serves 404.html for unknown paths
var path = location.pathname.replace(/\/$/, '') || '/';
var payMatch = path.match(/^\/pay\/(.+)$/);
if (payMatch) {
  sessionStorage.setItem('pay-request-id', payMatch[1]);
  location.replace('/pay');
} else {
  var routes = { '/': '/', '/consumers': '/', '/businesses': '/', '/merchants': '/', '/about': '/', '/contact': '/', '/blog': '/', '/delete-account': '/' };
  if (path in routes || path.indexOf('/blog/') === 0) {
    sessionStorage.setItem('spa-redirect', path);
    location.replace('/');
  } else {
    location.replace('/');
  }
}
</script>
</head>
<body></body>
</html>
