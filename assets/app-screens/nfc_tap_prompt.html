<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>tapara | NFC Payment</title>
<link href="../css/styles.css" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .nfc-animation-ring {
            border: 1px solid #000;
            border-radius: 50%;
            position: absolute;
            opacity: 0;
            animation: ripple 3s infinite;
        }
        @keyframes ripple {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .ripple-delay-1 { animation-delay: 0s; }
        .ripple-delay-2 { animation-delay: 1s; }
        .ripple-delay-3 { animation-delay: 2s; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-neutral-100 font-body text-on-surface">
<!-- Mock Background Content (Dashboard) -->
<main class="min-h-screen p-6 flex flex-col gap-8 opacity-40 grayscale pointer-events-none">
<header class="flex justify-between items-center h-16">
<h1 class="font-serif text-2xl tracking-tight font-bold text-neutral-900">tapara</h1>
<div class="w-10 h-10 rounded-full bg-neutral-200"></div>
</header>
<div class="space-y-6">
<div class="h-48 w-full bg-white rounded-xl p-6 shadow-sm flex flex-col justify-end">
<div class="h-4 w-24 bg-neutral-200 rounded"></div>
<div class="h-8 w-40 bg-neutral-300 rounded mt-2"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 bg-white rounded-xl shadow-sm"></div>
<div class="h-32 bg-white rounded-xl shadow-sm"></div>
</div>
<div class="space-y-4">
<div class="h-16 bg-white rounded-xl shadow-sm"></div>
<div class="h-16 bg-white rounded-xl shadow-sm"></div>
<div class="h-16 bg-white rounded-xl shadow-sm"></div>
</div>
</div>
</main>
<!-- Overlay Backdrop -->
<div class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40"></div>
<!-- NFC Modal -->
<div class="fixed bottom-0 left-0 right-0 h-[751px] bg-surface-container-lowest rounded-t-[20px] shadow-[0_-12px_40px_rgba(10,10,10,0.08)] z-50 flex flex-col items-center overflow-hidden">
<!-- Drag Handle -->
<div class="mt-3 mb-8">
<div class="w-12 h-1 bg-neutral-300 rounded-full"></div>
</div>
<!-- Content Container -->
<div class="flex-1 w-full max-w-md px-8 flex flex-col items-center justify-center gap-6 pb-12 text-center">
<!-- Illustration Section -->
<div class="relative w-full flex items-center justify-center">
<!-- Geometric Fern Texture (Watermark Quality) -->
<div class="absolute inset-0 opacity-[0.04] pointer-events-none flex items-center justify-center">
<span class="material-symbols-outlined text-[300px]" style="font-variation-settings: 'wght' 100;">eco</span>
</div>
<!-- NFC Animation Elements -->
<div class="relative flex flex-col items-center gap-8">
<!-- Phone Line Art -->
<div class="relative z-10 w-32 h-64 border-[3px] border-primary rounded-[2.5rem] bg-white p-2 flex flex-col items-center shadow-sm">
<div class="w-12 h-1 bg-primary rounded-full mb-4 mt-2"></div>
<div class="w-full flex-1 border border-neutral-100 rounded-[1.8rem] bg-neutral-50/50 flex items-center justify-center">
<span class="material-symbols-outlined text-primary/10 text-6xl">contactless</span>
</div>
</div>
<!-- Radiating Arcs (Visual Center) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 pointer-events-none">
<div class="nfc-animation-ring ripple-delay-1 inset-0"></div>
<div class="nfc-animation-ring ripple-delay-2 inset-0"></div>
<div class="nfc-animation-ring ripple-delay-3 inset-0"></div>
</div>
<!-- NFC Pad Square -->
<div class="relative z-10 w-24 h-24 bg-primary rounded-2xl flex items-center justify-center">
<img src="../images/tapara - logo-white.svg" alt="tapara logo" class="w-full h-full">
</div>
</div>
</div>
<!-- Typography Section -->
<div class="space-y-7">
  <h2 class="font-serif text-3xl text-primary font-bold tracking-tight">Hold your phone near the tapara pad</h2>
<div class="flex flex-col items-center gap-1 font-sans text-secondary text-lg">
  <p>Find the tapara NFC pad on the counter. One tap to check in, get recognised, and pay — near-zero fees.</p>
</div>
</div>

<!-- Fallback/Ghost Bottom Bar for consistency with Shared Components -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pt-2 pb-8 px-4 bg-white/80 backdrop-blur-xl border-t border-neutral-100 z-[60] pointer-events-none invisible">
<div class="flex flex-col items-center justify-center text-neutral-400 px-4 py-1">
<span class="material-symbols-outlined">home_app_logo</span>
<span class="text-[10px] uppercase tracking-widest font-medium mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-neutral-400 px-4 py-1">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] uppercase tracking-widest font-medium mt-1">Activity</span>
</div>
<div class="flex flex-col items-center justify-center text-neutral-400 px-4 py-1">
<span class="material-symbols-outlined">loyalty</span>
<span class="text-[10px] uppercase tracking-widest font-medium mt-1">Loyalty</span>
</div>
<div class="flex flex-col items-center justify-center text-neutral-400 px-4 py-1">
<span class="material-symbols-outlined">group_work</span>
<span class="text-[10px] uppercase tracking-widest font-medium mt-1">Admin</span>
</div>
</nav>
</body></html>
